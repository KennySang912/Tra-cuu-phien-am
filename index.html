<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Từ Điển Anh-Việt Thông Minh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .image-container {
            width: 100%;
            height: 220px;
            background-color: #f1f5f9;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
    </style>
</head>
<body class="min-h-screen py-8 px-4">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Từ Điển Anh-Việt AI</h1>
            <p class="text-gray-500">Tra cứu phiên âm và hình ảnh minh họa</p>
        </header>

        <div class="relative mb-8 max-w-2xl mx-auto">
            <div class="flex items-center glass-morphism rounded-2xl p-2 border border-blue-100 focus-within:ring-2 ring-blue-400">
                <input type="text" id="searchInput" placeholder="Nhập từ cần tra..." 
                    class="w-full bg-transparent border-none focus:outline-none px-4 py-3 text-lg">
                <button id="searchBtn" class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl min-w-[50px]">
                    <i class="fas fa-search" id="searchIcon"></i>
                    <div id="loader" class="loading-spinner hidden"></div>
                </button>
            </div>
        </div>

        <div id="resultArea" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
                <div class="md:col-span-5 glass-morphism rounded-3xl p-3 border border-gray-100">
                    <div class="image-container">
                        <img id="resImage" src="" alt="Minh họa" class="w-full h-full object-cover rounded-xl hidden">
                        <div id="imagePlaceholder" class="text-gray-400 flex flex-col items-center">
                            <i class="far fa-image text-4xl mb-2"></i>
                            <p class="text-xs">Hình ảnh minh họa</p>
                        </div>
                    </div>
                </div>
                <div class="md:col-span-7 glass-morphism rounded-3xl p-6 border border-gray-100">
                    <h2 id="resWord" class="text-3xl font-bold text-gray-900 mb-2">Word</h2>
                    <div class="flex gap-3 mb-4">
                        <span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-sm font-medium">UK: <span id="resPhoneticUK"></span></span>
                        <span class="bg-red-50 text-red-600 px-3 py-1 rounded-full text-sm font-medium">US: <span id="resPhoneticUS"></span></span>
                    </div>
                    <div class="bg-blue-50/50 p-4 rounded-xl">
                        <p id="resMeaning" class="text-lg text-gray-800 font-medium"></p>
                    </div>
                </div>
            </div>
            <div id="resExamples" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <div id="errorArea" class="hidden bg-red-50 text-red-600 p-4 rounded-xl border border-red-100 text-center mt-4">
            <p id="errorMsg" class="font-medium"></p>
            <p class="text-xs mt-2 opacity-70">Lưu ý: Nếu lỗi 403/400, hãy kiểm tra lại API Key của bạn.</p>
        </div>
    </div>

    <script type="module">
        // QUAN TRỌNG: Dán API Key vào đây. 
        // Nếu dùng GitHub Public, hãy dán trực tiếp trên web GitHub để tránh bị quét tự động.
        const apiKey = "AIzaSyCyg2yHWuWEadvnOXKejy4MFNzqx95n7B4"; 

        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultArea = document.getElementById('resultArea');
        const errorArea = document.getElementById('errorArea');

        const handleSearch = async () => {
            const query = searchInput.value.trim();
            if (!query) return;
            if (!apiKey || apiKey === "") {
                showError("Bạn chưa điền API Key vào mã nguồn (dòng 86).");
                return;
            }

            setLoading(true);
            errorArea.classList.add('hidden');
            resultArea.classList.add('hidden');

            try {
                // Sử dụng model 1.5 Flash vì đây là model ổn định nhất cho tài khoản Free
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [{ text: `Trả về thông tin từ điển cho từ "${query}" dưới dạng JSON thuần túy (không dùng Markdown) với các khóa: word, phonetic_uk, phonetic_us, vietnamese_meaning, examples (mảng 3 ví dụ dạng "English - Vietnamese").` }] 
                        }],
                        generationConfig: { 
                            responseMimeType: "application/json",
                            temperature: 0.2
                        }
                    })
                });

                if (!response.ok) {
                    const errorJson = await response.json();
                    const message = errorJson.error?.message || "Lỗi không xác định";
                    
                    if (response.status === 403 || message.includes("API key")) {
                        throw new Error("API Key không hợp lệ. Có thể GitHub đã tự động vô hiệu hóa Key của bạn do phát hiện lộ mã nguồn công khai.");
                    }
                    throw new Error(`Lỗi kết nối (${response.status}): ${message}`);
                }

                const data = await response.json();
                const content = JSON.parse(data.candidates[0].content.parts[0].text);
                
                // Cập nhật giao diện
                document.getElementById('resWord').textContent = content.word;
                document.getElementById('resPhoneticUK').textContent = content.phonetic_uk || "/.../";
                document.getElementById('resPhoneticUS').textContent = content.phonetic_us || "/.../";
                document.getElementById('resMeaning').textContent = content.vietnamese_meaning;
                
                document.getElementById('resExamples').innerHTML = content.examples.map(ex => `
                    <div class="bg-gray-50 p-3 rounded-xl border border-gray-100 text-sm">
                        <p class="italic text-gray-700">${ex}</p>
                    </div>
                `).join('');

                // Hiển thị ảnh minh họa từ Unsplash (vì Imagen cần cấu hình phức tạp hơn)
                const resImage = document.getElementById('resImage');
                resImage.src = `https://images.unsplash.com/photo-1546410531-bb4caa6b424d?q=80&w=500&auto=format&fit=crop`; // Ảnh tạm
                setTimeout(() => {
                    resImage.src = `https://source.unsplash.com/featured/500x500?${query}`;
                    resImage.classList.remove('hidden');
                    document.getElementById('imagePlaceholder').classList.add('hidden');
                }, 100);

                resultArea.classList.remove('hidden');
            } catch (err) {
                console.error("Fetch Error:", err);
                showError(err.message);
            } finally {
                setLoading(false);
            }
        };

        const setLoading = (s) => {
            document.getElementById('searchIcon').classList.toggle('hidden', s);
            document.getElementById('loader').classList.toggle('hidden', !s);
            searchBtn.disabled = s;
        };

        const showError = (m) => {
            errorArea.classList.remove('hidden');
            document.getElementById('errorMsg').textContent = m;
        };

        searchBtn.addEventListener('click', handleSearch);
        searchInput.addEventListener('keypress', (e) => e.key === 'Enter' && handleSearch());
    </script>
</body>
</html>
